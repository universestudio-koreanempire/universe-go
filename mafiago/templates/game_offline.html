<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>오프라인 마피아</title>
<style>
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;font-family:sans-serif;text-align:center;color:white;background:linear-gradient(120deg,#000,#222);transition:background 1s;}
.screen{display:none;width:100%;height:100%;padding:20px;box-sizing:border-box;overflow-y:auto;}
.active{display:block;}
button{padding:16px;margin:8px;font-size:20px;border:none;border-radius:12px;background:#333;color:white;width:90%;cursor:pointer;transition:0.3s;}
button:hover{background:#555;}
.playerBtn{display:block;margin:10px auto;}
.playerBtn.dead{opacity:0.3;text-decoration:line-through;}
.night{animation:gradientNight 10s infinite alternate;}
.day{color:black;animation:gradientDay 10s infinite alternate;}
.role{font-size:40px;margin:30px;}
.timer{font-size:30px;margin:20px;}
.deadList{font-size:20px;color:red;margin-top:10px;}
.back-btn{position:fixed;top:15px;left:15px;width:auto;padding:8px 16px;font-size:14px;background:rgba(255,255,255,0.2);border-radius:8px;}
input[type=number]{font-size:20px;width:80%;padding:10px;border-radius:8px;border:none;text-align:center;}
@keyframes gradientNight{0%{background:linear-gradient(120deg,#020024,#090979);}50%{background:linear-gradient(120deg,#040046,#1CB5E0);}100%{background:linear-gradient(120deg,#020024,#090979);}}
@keyframes gradientDay{0%{background:linear-gradient(120deg,#ffe082,#fff3b0);}50%{background:linear-gradient(120deg,#ffd54f,#fff9c4);}100%{background:linear-gradient(120deg,#ffe082,#fff3b0);}}
</style>
</head>
<body>

<button class="back-btn" onclick="location.href='/game'">← 메인</button>

<!-- 시작 -->
<div id="start" class="screen active">
  <h1>📱 오프라인 모드</h1>
  <p>플레이어 수</p>
  <input id="playerCount" type="number" value="6" min="4" max="20">
  <br><br>
  <button onclick="startGame()">게임 시작</button>
</div>

<!-- 역할 확인 -->
<div id="roleScreen" class="screen">
  <h2 id="rolePlayer"></h2>
  <div id="roleText" class="role"></div>
  <button onclick="showRole()">직업 보기</button>
  <button onclick="nextRole()">다음</button>
</div>

<!-- 밤 -->
<div id="nightScreen" class="screen night">
  <h1>🌙 밤</h1>
  <h2 id="nightAction"></h2>
  <div id="playerButtons"></div>
</div>

<!-- 밤 결과 -->
<div id="resultScreen" class="screen">
  <h2 id="nightResult"></h2>
  <button onclick="dayStart()">낮 시작</button>
</div>

<!-- 낮 토론 -->
<div id="dayScreen" class="screen day">
  <h1>☀ 낮 토론</h1>
  <div id="timer" class="timer">60</div>
  <button onclick="startVote()">투표 시작</button>
  <div id="deadList" class="deadList"></div>
</div>

<!-- 투표 -->
<div id="voteScreen" class="screen">
  <h2 id="votePlayer"></h2>
  <div id="voteButtons"></div>
</div>

<!-- 투표 결과 -->
<div id="voteResultScreen" class="screen">
  <h2 id="voteResult"></h2>
  <button onclick="nightStart()">다음 밤</button>
</div>

<script>
let playerCount = 6;
let alive = [];
let dead = [];
let roleIndex = 0;
let time = 60, timerInt;
let voteIndex = 0;

function show(id){
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

async function startGame(){
  playerCount = parseInt(document.getElementById("playerCount").value);
  const res = await fetch("/api/offline/start", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({player_count: playerCount})
  });
  const data = await res.json();
  if(data.error){ alert(data.error); return; }
  alive = new Array(playerCount).fill(true);
  dead = [];
  roleIndex = 0;
  show("roleScreen");
  updateRole();
}

function updateRole(){
  document.getElementById("rolePlayer").innerText = (roleIndex+1) + "번 플레이어";
  document.getElementById("roleText").innerText = "";
}

async function showRole(){
  const res = await fetch(`/api/offline/role/${roleIndex}`);
  const data = await res.json();
  document.getElementById("roleText").innerText = data.role;
}

function nextRole(){
  roleIndex++;
  if(roleIndex >= playerCount) nightStart();
  else updateRole();
}

function nightStart(){
  document.body.className = "night";
  show("nightScreen");
  updateNight();
}

async function updateNight(){
  const res = await fetch("/api/offline/state");
  const state = await res.json();
  const step = state.night_step;
  let text = "";
  if(step === "mafia") text = "🔫 마피아가 죽일 사람 선택";
  else if(step === "doctor") text = "🧑‍⚕️ 의사가 살릴 사람 선택";
  else text = "👮 경찰이 조사할 사람 선택";
  document.getElementById("nightAction").innerText = text;
  alive = state.alive;
  let html = "";
  for(let i=0; i<playerCount; i++){
    if(!alive[i]) continue;
    html += `<button class="playerBtn" onclick="nightSelect(${i})">${i+1}번</button>`;
  }
  document.getElementById("playerButtons").innerHTML = html;
}

async function nightSelect(i){
  const res = await fetch("/api/offline/night/select", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({target: i})
  });
  const data = await res.json();
  if(data.next_step){ updateNight(); }
  else { handleNightResult(data); }
}

function handleNightResult(data){
  show("resultScreen");
  if(data.deaths && data.deaths.length){
    data.deaths.forEach(p => { alive[p-1] = false; if(!dead.includes(p)) dead.push(p); });
  }
  let text = "🌙 밤 결과:<br>";
  text += data.deaths && data.deaths.length ? `🔫 마피아가 죽인 플레이어: ${data.deaths.join(", ")}<br>` : "🔫 마피아 공격으로 사망자 없음<br>";
  text += data.saves && data.saves.length ? `🧑‍⚕️ 의사가 살린 플레이어: ${data.saves.join(", ")}<br>` : "🧑‍⚕️ 의사가 살린 플레이어 없음<br>";
  text += `👮 경찰 조사: ${data.police}<br>`;
  document.getElementById("nightResult").innerHTML = text;
  if(data.win) checkWinAlert(data.win);
}

function dayStart(){
  show("dayScreen");
  document.body.className = "day";
  document.getElementById("deadList").innerHTML = "사망자: " + (dead.length ? dead.join(", ")+"번" : "없음");
  time = 60;
  const timerEl = document.getElementById("timer");
  timerEl.innerText = time;
  clearInterval(timerInt);
  timerInt = setInterval(()=>{ time--; timerEl.innerText = time; if(time<=0) clearInterval(timerInt); }, 1000);
}

async function startVote(){
  clearInterval(timerInt);
  const res = await fetch("/api/offline/vote/start", {method:"POST", headers:{"Content-Type":"application/json"}, body:"{}"});
  const data = await res.json();
  voteIndex = (data.current_voter || 1) - 1;
  show("voteScreen");
  renderVote();
}

function renderVote(){
  while(voteIndex < playerCount && !alive[voteIndex]) voteIndex++;
  if(voteIndex >= playerCount) return;
  document.getElementById("votePlayer").innerText = (voteIndex+1) + "번 플레이어 투표";
  let html = "";
  for(let i=0; i<playerCount; i++){
    if(!alive[i]) continue;
    html += `<button class="playerBtn" onclick="castVote(${i})">${i+1}번</button>`;
  }
  document.getElementById("voteButtons").innerHTML = html;
}

async function castVote(target){
  const res = await fetch("/api/offline/vote/cast", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({target})
  });
  const data = await res.json();
  alert("투표 완료");
  if(data.eliminated !== undefined){
    show("voteResultScreen");
    if(data.tie){
      document.getElementById("voteResult").innerText = "⚖ 동률입니다. 아무도 추방되지 않았습니다";
    } else {
      alive[data.eliminated-1] = false;
      if(!dead.includes(data.eliminated)) dead.push(data.eliminated);
      document.getElementById("voteResult").innerText = `${data.eliminated}번이 추방되었습니다`;
    }
    if(data.win) checkWinAlert(data.win);
  } else {
    voteIndex = data.current_voter - 1;
    renderVote();
  }
}

function checkWinAlert(win){
  if(win === "citizen") setTimeout(()=>{ alert("🏆 시민 승리!"); location.href="/game"; }, 300);
  else if(win === "mafia") setTimeout(()=>{ alert("💀 마피아 승리!"); location.href="/game"; }, 300);
}
</script>
</body>
</html>
