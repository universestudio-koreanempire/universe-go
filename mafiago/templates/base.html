<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}Mafia GO! - 유니버스{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Black+Han+Sans&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>

    <!-- 앱 상단 헤더 -->
    <header class="app-header">
        <div class="app-header-left">
            <a href="{{ url_for('index') }}" class="app-logo">{{ site_name }}</a>
        </div>
        <div class="app-header-right">
        </div>
    </header>

    <!-- 플래시 메시지 -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="flash-container">
                {% for category, message in messages %}
                    <div class="flash flash-{{ category }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    <!-- 메인 컨텐츠 -->
    <main class="main-content app-main">
        {% block content %}{% endblock %}
    </main>

    <!-- 하단 탭바 -->
    <nav class="bottom-tab-bar">
        <a href="{{ url_for('index') }}" class="tab-item {% if request.endpoint == 'index' %}active{% endif %}">
            <span class="tab-icon">🏠</span>
            <span class="tab-label">홈</span>
        </a>
        <a href="{{ url_for('notices_list') }}" class="tab-item {% if 'notice' in request.endpoint %}active{% endif %}">
            <span class="tab-icon">📢</span>
            <span class="tab-label">공지</span>
        </a>
        <a href="/game" class="tab-item tab-center-btn">
            <span class="tab-icon">🕵️</span>
            <span class="tab-label">게임</span>
        </a>
        <a href="{{ url_for('store') }}" class="tab-item {% if request.endpoint == 'store' %}active{% endif %}">
            <span class="tab-icon">🛒</span>
            <span class="tab-label">스토어</span>
        </a>
        <a href="{{ url_for('sitemap') }}" class="tab-item {% if request.endpoint == 'sitemap' %}active{% endif %}">
            <span class="tab-icon">☰</span>
            <span class="tab-label">전체보기</span>
        </a>
    </nav>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
