{% extends "base.html" %}
{% block title %}로그인 - Mafia GO!{% endblock %}
{% block content %}
<div class="form-container fade-up">
    <h2 class="form-title">로그인</h2>
    <p class="form-subtitle">Mafia GO!에 오신 것을 환영합니다</p>
    <form method="POST">
        <div class="form-group">
            <label for="username">아이디</label>
            <input type="text" id="username" name="username" placeholder="아이디를 입력하세요" required>
        </div>
        <div class="form-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required>
        </div>
        <button type="submit" class="form-submit">로그인</button>
    </form>
    <p class="form-footer">계정이 없으신가요? <a href="{{ url_for('register') }}">회원가입</a></p>
</div>
{% endblock %}
