{% extends "base.html" %}
{% block title %}공지사항 등록 - {{ site_name }}{% endblock %}
{% block content %}
<div class="page-header">
    <h1>📢 공지사항 등록</h1>
    <p>관리자 전용 페이지입니다</p>
</div>
<div class="form-container fade-up">
    <h2 class="form-title">공지사항 작성</h2>
    <p class="form-subtitle">등록된 공지는 즉시 모든 사용자에게 표시됩니다</p>
    <form method="POST">
        <div class="form-group">
            <label for="title">제목 <span style="color:#e74c3c;">*</span></label>
            <input type="text" id="title" name="title" placeholder="공지사항 제목을 입력하세요" required>
        </div>
        <div class="form-group">
            <label for="content">내용 <span style="color:#e74c3c;">*</span></label>
            <textarea id="content" name="content" placeholder="공지사항 내용을 입력하세요" style="min-height: 200px;" required></textarea>
        </div>
        <button type="submit" class="form-submit">📢 공지사항 등록</button>
    </form>
    <div class="form-footer">
        <a href="{{ url_for('notices_list') }}">← 공지사항 목록으로</a>
    </div>
</div>
{% endblock %}
