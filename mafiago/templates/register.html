{% extends "base.html" %}
{% block title %}회원가입 - Mafia GO!{% endblock %}
{% block content %}
<div class="form-container fade-up">
    <h2 class="form-title">회원가입</h2>
    <p class="form-subtitle">Mafia GO! 회원이 되어 더 많은 혜택을 누리세요</p>
    <form method="POST">
        <div class="form-group">
            <label for="username">아이디 <span style="color: #e74c3c;">*</span></label>
            <input type="text" id="username" name="username" placeholder="아이디를 입력하세요" required>
        </div>
        <div class="form-group">
            <label for="password">비밀번호 <span style="color: #e74c3c;">*</span></label>
            <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required>
        </div>
        <div class="form-group">
            <label for="email">이메일 <span style="color: #aaa; font-size: .8rem; font-weight: 400;">(선택)</span></label>
            <input type="email" id="email" name="email" placeholder="이메일을 입력하세요 (선택사항)">
        </div>
        <button type="submit" class="form-submit">회원가입</button>
    </form>
    <p class="form-footer">이미 계정이 있으신가요? <a href="{{ url_for('login') }}">로그인</a></p>
    <p class="form-footer" style="margin-top:12px; font-size:0.78rem; color:#aaa; line-height:1.7;">
        여기서 회원가입하면 이 사이트의 <a href="{{ url_for('privacy') }}" style="color:var(--green-primary); font-weight:600;">개인정보 처리 방침</a>에 동의하는 것으로 간주됩니다.
    </p>
</div>
{% endblock %}
