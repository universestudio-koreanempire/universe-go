{% extends "base.html" %}
{% block title %}{{ notice.title }} - Mafia GO!{% endblock %}
{% block content %}
<div class="content-page fade-up">
    <a href="{{ url_for('notices_list') }}" class="back-btn">← 목록으로</a>
    <div class="notice-detail">
        <h2>{{ notice.title }}</h2>
        <p class="notice-meta">등록일: {{ notice.date }}</p>
        <div class="notice-body">{{ notice.content }}</div>
    </div>
</div>
{% endblock %}
