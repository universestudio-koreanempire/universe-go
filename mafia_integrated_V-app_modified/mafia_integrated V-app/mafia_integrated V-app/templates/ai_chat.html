<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kepler AI</title>

<style>
:root {
  --bg: #020617;
  --text: white;
  --box: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.1);
}

.light {
  --bg: #f1f5f9;
  --text: #111;
  --box: #ffffff;
  --border: #ddd;
}

body {
  margin:0;
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', sans-serif;
  transition:0.3s;
}

/* 헤더 */
header {
  padding:18px;
  font-size:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:var(--box);
  border-bottom:1px solid var(--border);
}

#themeBtn {
  background:none;
  border:none;
  color:var(--text);
  font-size:18px;
  cursor:pointer;
}

/* API 입력 */
#apiBox {
  padding:10px;
  text-align:center;
  border-bottom:1px solid var(--border);
}

#apiInput {
  width:70%;
  padding:10px;
  border-radius:10px;
  border:none;
  background:var(--box);
  color:var(--text);
}

/* 채팅 */
#chat {
  height:75vh;
  overflow-y:auto;
  padding:15px;
}

.msg {
  margin:10px 0;
  padding:14px;
  border-radius:18px;
  max-width:75%;
  animation: pop 0.2s ease;
}

.user {
  margin-left:auto;
  background: linear-gradient(135deg, #3b82f6, #2563eb);
}

.ai {
  background: var(--box);
  border:1px solid var(--border);
}

/* 입력 */
#inputArea {
  display:flex;
  padding:12px;
  border-top:1px solid var(--border);
}

input {
  flex:1;
  padding:12px;
  border-radius:12px;
  border:none;
  background:var(--box);
  color:var(--text);
  outline:none;
}

button {
  margin-left:10px;
  padding:12px 16px;
  border:none;
  border-radius:12px;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color:white;
  cursor:pointer;
}

@keyframes pop {
  from { transform:scale(0.95); opacity:0; }
  to { transform:scale(1); opacity:1; }
}
</style>
</head>

<body>

<header>
  <div style="text-align: center;">
    <div style="font-size: 18px; font-weight: bold;">
      💬 Kepler AI
    </div>

    <div style="font-size: 12px; color: #888; margin-top: 4px;">
      이 서비스는 ChatGPT와 함께합니다.
    </div>
  </div>

  <button id="themeBtn" onclick="toggleTheme()">🌙</button>
</header>

<div id="chat"></div>

<div id="inputArea">
  <input id="input" placeholder="메시지 입력..." />
  <button onclick="send()">➤</button>
</div>

<script>
let messages = [
  {
    role: "system",
    content: "친구처럼 자연스럽고 센스있게 대화하고 절대 모른다고 하지마."
  }
];

// 💬 메시지 출력
function addMessage(text, type) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg " + type;
  chat.appendChild(div);

  if (type === "ai") {
    let i = 0;
    function typing() {
      if (i < text.length) {
        div.innerHTML += text[i];
        i++;
        setTimeout(typing, 10);
      }
    }
    typing();
  } else {
    div.innerText = text;
  }

  chat.scrollTop = chat.scrollHeight;
}

// 🚀 서버 전송
async function send() {
  const input = document.getElementById("input");
  const msg = input.value.trim();

  if (!msg) {
    alert("메시지를 입력해야 함");
    return;
  }

  addMessage(msg, "user");
  input.value = "";

  messages.push({ role: "user", content: msg });

  try {
const res = await fetch("/ai-chat/chat", {
    method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        messages: messages
      })
    });

    const data = await res.json();
    const reply = data.reply;

    messages.push({ role: "assistant", content: reply });
    addMessage(reply, "ai");

  } catch (e) {
    addMessage("⚠️ 서버 오류 발생", "ai");
  }
}

// 🌙 테마 토글
function toggleTheme() {
  document.body.classList.toggle("light");

  const isLight = document.body.classList.contains("light");
  localStorage.setItem("theme", isLight ? "light" : "dark");

  document.getElementById("themeBtn").innerText = isLight ? "☀️" : "🌙";
}

// 💾 테마 불러오기
window.onload = () => {
  const saved = localStorage.getItem("theme");

  if (saved === "light") {
    document.body.classList.add("light");
    document.getElementById("themeBtn").innerText = "☀️";
  }
};
</script>

</body>
</html>
