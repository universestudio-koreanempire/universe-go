<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create GO 경매장</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="app-body">
<div class="app-shell">
<a href="/create-go" class="back-link">← 홈으로</a>
<div class="section-title">💰 경매장</div>
<div class="post-grid">
{% if posts %}
{% for post in posts %}
<div class="post-card">
<div class="post-title">{{ post.title }}</div>
<img src="{{ url_for('create_go_uploaded_file', filename=post.image_path) }}">
<div class="auction-row">
<div class="bid-box">
<input class="bid-input" placeholder="입찰 금액">
<button class="primary-btn">입찰</button>
</div>
</div>
</div>
{% endfor %}
{% else %}
<div class="empty-box">경매 가능한 작품이 없습니다.</div>
{% endif %}
</div>
</div>
</body>
</html>
