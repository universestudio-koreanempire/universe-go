<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>🕵‍♂️ Mafia go 🕵‍♀️</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;font-family:sans-serif;color:white;
  background:linear-gradient(135deg,#0a0a1a 0%,#1a0a2e 50%,#0a1a0a 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
h1{font-size:48px;margin-bottom:10px;letter-spacing:2px;}
.subtitle{font-size:16px;color:#aaa;margin-bottom:50px;}
.card-container{display:flex;gap:30px;flex-wrap:wrap;justify-content:center;padding:20px;}
.card{background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.1);border-radius:20px;padding:40px 30px;width:260px;cursor:pointer;transition:all 0.3s;text-decoration:none;color:white;display:block;}
.card:hover{transform:translateY(-8px);border-color:rgba(255,255,255,0.4);background:rgba(255,255,255,0.1);}
.card .icon{font-size:60px;margin-bottom:20px;}
.card .title{font-size:24px;font-weight:bold;margin-bottom:10px;}
.card .desc{font-size:14px;color:#aaa;line-height:1.6;}
.card.offline{border-color:rgba(100,200,255,0.3);}
.card.offline:hover{border-color:rgba(100,200,255,0.8);box-shadow:0 0 30px rgba(100,200,255,0.2);}
.card.online{border-color:rgba(255,100,100,0.3);}
.card.online:hover{border-color:rgba(255,100,100,0.8);box-shadow:0 0 30px rgba(255,100,100,0.2);}
#splash{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center;z-index:9999;opacity:1;transition:opacity 0.5s ease;}
#splash.hide{opacity:0;pointer-events:none;}
#splash img{width:100%;height:100%;object-fit:cover;}
</style>
</head>
<body>

<div id="splash">
    <img id="splashImg" src="/static/splash.jpg" alt="U.B Studio">
    <div id="loader"></div>
</div>

<script>
  window.addEventListener('load', function () {
    setTimeout(function () {
      document.getElementById('splash').classList.add('hide');
    }, 3000);
  });
</script>

{{ top_bar|safe }}
<h1>🕵‍♂️ Mafia go 🕵‍♀️</h1>
<p class="subtitle">게임 모드를 선택하세요</p>
<div class="card-container">
  <a href="/game/offline" class="card offline">
    <div class="icon">📱</div>
    <div class="title">오프라인 모드</div>
    <div class="desc">한 기기로 여러 명이 함께!<br>역할을 순서대로 확인하며<br>진행하는 오프라인 게임</div>
  </a>
<a href="/game/nickname" class="card online">
    <div class="icon">🌐</div>
    <div class="title">온라인 모드</div>
    <div class="desc">각자 기기로 접속해서 플레이!<br>실시간 채팅과 투표로<br>진행하는 온라인 멀티플레이</div>
  </a>
<a href="/game/ai" class="card ai">
  <div class="icon">🤖</div>
  <div class="title">AI와 플레이</div>
  <div class="desc">
    혼자서 AI와 함께!<br>
    AI 플레이어들과<br>
    마피아 게임을 즐겨보세요
  </div>
</a>
</div>
</body>
</html>
